<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeklifChat - Teklif Almanın En Kolay Yolu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <nav class="flex justify-between items-center py-6 px-10">
        <div class="text-2xl font-bold text-indigo-700">TeklifChat</div>
        <div class="space-x-6">
            <a href="#" class="text-gray-600">Nasıl Çalışır?</a>
            <a href="#" class="text-gray-600">Kategoriler</a>
            <button class="px-4 py-2 border rounded-lg">Giriş Yap</button>
            <button class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Firma Girişi</button>
        </div>
    </nav>

    <header class="text-center py-16">
        <h1 class="text-5xl font-extrabold text-gray-900 mb-4">İhtiyacını Yaz, Teklifleri Karşılaştır!</h1>
        <p class="text-gray-600 mb-8">Binlerce firma arasından sana en uygun teklifi sunanları bul.</p>
        
        <div class="max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-lg flex gap-4">
            <input type="text" placeholder="Örn: İstanbul'da ev boya badana hizmeti arıyorum." class="flex-grow p-3 border rounded-lg">
            <select class="p-3 border rounded-lg">
                <option>Kategori Seçin</option>
            </select>
            <button class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-bold">Talep Oluştur</button>
        </div>
    </header>

</body>
</html>
